<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kasi.connect101</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
}

/* NAVBAR */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    border-bottom: 1px solid #222;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo img {
    height: 50px;
}

.logo span {
    font-weight: bold;
    letter-spacing: 2px;
}

nav a {
    margin: 0 15px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

nav a:hover {
    color: #888;
}

/* HERO */
.hero {
    text-align: center;
    padding: 100px 20px;
}

.hero h1 {
    font-size: 3rem;
    letter-spacing: 3px;
}

.hero p {
    margin-top: 10px;
    color: #aaa;
}

.hero button {
    margin-top: 20px;
    padding: 12px 30px;
    background: white;
    color: black;
    border: none;
    cursor: pointer;
    transition: 0.3s;
}

.hero button:hover {
    background: #aaa;
}

/* PRODUCTS */
.products {
    padding: 60px 20px;
    text-align: center;
}

.products h2 {
    margin-bottom: 40px;
}

.grid {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
}

.card {
    border: 1px solid #333;
    width: 250px;
    padding: 20px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    border-color: white;
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.card button {
    margin-top: 10px;
    padding: 8px 20px;
    border: 1px solid white;
    background: transparent;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.card button:hover {
    background: white;
    color: black;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    border-top: 1px solid #222;
    margin-top: 40px;
}
</style>
</head>

<body>

<header>
    <div class="logo">
        <img src="logo.png" alt="logo">
        <span>kasi.connect101</span>
    </div>

    <nav>
        <a href="#">Home</a>
        <a href="#products">Products</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1>FUTURE STREET TECH</h1>
    <p>Sneakers & Cellphones — Kasi Style</p>
    <button onclick="scrollToProducts()">Shop Now</button>
</section>

<section id="products" class="products">
    <h2>Our Products</h2>

    <div class="grid">

        <div class="card">
            <img src="https://via.placeholder.com/250x180" alt="">
            <h3>Sneakers</h3>
            <p>Latest street fashion</p>
            <button onclick="alert('Sneakers coming soon!')">View</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/250x180" alt="">
            <h3>Cellphones</h3>
            <p>Smart & powerful devices</p>
            <button onclick="alert('Phones coming soon!')">View</button>
        </div>

    </div>
</section>

<footer id="contact">
    <p>Contact: info@kasi-connect101.com</p>
    <p>© 2026 kasi.connect101</p>
</footer>

<script>
function scrollToProducts() {
    document.getElementById("products").scrollIntoView({
        behavior: "smooth"
    });
}
</script>

</body>
</html>
